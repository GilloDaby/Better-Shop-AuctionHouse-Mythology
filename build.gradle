plugins {
    id 'java'
}

group = 'com.gillodaby'
version = '3.1.1'

tasks.named('jar') {
    archiveBaseName.set('BetterShopAuctionMythologyUI')
}

tasks.named('jar') {
    if (file('plugin.json').exists()) {
        from('plugin.json') { into '' }
    }
    if (file('manifest.json').exists()) {
        from('manifest.json') { into '' }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = 25
    options.compilerArgs += ['-Xlint:deprecation', '-Xlint:unchecked', '-Xlint:removal']
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly files("../libs/HytaleServer.jar")
    compileOnly "org.jetbrains:annotations:26.0.2"
}
